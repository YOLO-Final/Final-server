<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자동 검사 | 검사 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/ui.css" />
  </head>
  <body class="page-auto">
    <main class="app-shell">
      <header class="dashboard-headbar" aria-label="검사 헤더">
        <div class="model-badge">
          <span class="model-icon" aria-hidden="true"></span>
          <span>감지 모델 : PCB -1</span>
        </div>

        <div class="headbar-right">
          <div class="signal-group" aria-label="신호등">
            <span id="signal-red" class="signal-light signal-red" aria-hidden="true"></span>
            <span id="signal-yellow" class="signal-light signal-yellow" aria-hidden="true"></span>
            <span id="signal-green" class="signal-light signal-green" aria-hidden="true"></span>
          </div>

          <div class="worker-box">
            <p class="worker-name">작업자 : 옥준영</p>
            <button id="logout-btn" class="head-logout-btn" type="button">로그아웃</button>
          </div>
        </div>
      </header>

      <section class="top-zone">
        <nav class="side-menu" aria-label="메인 모드 메뉴">
          <button class="menu-btn" data-mode="auto">자동 검사</button>
          <button class="menu-btn" data-mode="configuration">설정</button>
          <button class="menu-btn" data-mode="iot">IoT 설정</button>
          <button class="menu-btn" data-mode="result">결과</button>
          <textarea
            id="log-display"
            class="log-display-box"
            style="min-height: 265px;"
            readonly
            placeholder="로그 메시지가 여기에 표시됩니다..."></textarea>

        </nav>



        <section class="work-area" aria-live="polite">

          <div class="manual-panel manual-panel-full" id="manual-panel" hidden>
            <div class="camera-stage" role="img" aria-label="카메라 또는 이미지 영역">
              <div class="camera-overlay" aria-hidden="true">
                <p class="overlay-count overlay-ok" style="font-size: 16px;">OK : <span id="overlay-ok-count">0</span></p>
                <p class="overlay-count overlay-ng" style="font-size: 16px;">NG : <span id="overlay-ng-count">0</span></p>
              </div>
              <video
                id="camera-video"
                class="camera-video"
                autoplay
                muted
                playsinline
              ></video>
              <img
                id="camera-overlay-stream"
                class="camera-video"
                alt="온프레미스 오버레이 스트림"
                hidden
              />
              <p id="camera-placeholder" class="camera-placeholder">
                카메라가 준비되었습니다. 시작하는 중입니다...
              </p>
            </div>
          </div>

          <canvas id="camera-canvas" class="camera-canvas" hidden></canvas>
        </section>
      </section>

      <section class="chatbot-bar chatbot-tabs" aria-label="챗봇 빠른 질문 탭">
        <div class="chat-tab-list" role="tablist" aria-label="질문 모드 탭">
          <button class="chat-tab is-active" type="button" role="tab" aria-selected="true" data-chat-tab="simple">
            간편 모드
          </button>
          <button class="chat-tab" type="button" role="tab" aria-selected="false" data-chat-tab="question">
            질문 모드
          </button>
          <button class="chat-tab" type="button" role="tab" aria-selected="false" data-chat-tab="handover">
            인수인계
          </button>
        </div>

        <div class="chat-tab-panel" role="tabpanel" aria-live="polite" data-chat-panel="simple">
          <div id="simple-question-list" class="chat-question-list" role="list" aria-label="추천 질문 목록">
            <button class="chat-question-item chat-question-btn" type="button" role="listitem" data-question="이 장비는 작업을 시작하려면 어떤 순서로 조작해야 하나요?">
              이 장비는 작업을 시작하려면 어떤 순서로 조작해야 하나요?
            </button>
            <button class="chat-question-item chat-question-btn" type="button" role="listitem" data-question="작업 중 에러가 발생하면 어떻게 조치해야 하나요?">
              작업 중 에러가 발생하면 어떻게 조치해야 하나요?
            </button>
            <button class="chat-question-item chat-question-btn" type="button" role="listitem" data-question="제품 종류에 따라 어떤 설정 값을 바꿔야 하나요?">
              제품 종류에 따라 어떤 설정 값을 바꿔야 하나요?
            </button>
          </div>
        </div>

        <div class="chat-tab-panel" role="tabpanel" aria-live="polite" data-chat-panel="question" hidden>
          <textarea
            id="chatbot-display"
            class="chat-display-box"
            readonly
            placeholder="챗봇 응답이 여기에 표시됩니다..."
          ></textarea>

          <form class="ask-form" aria-label="질문 입력 폼">
            <div class="ask-voice-controls">
              <button
                id="mic-btn"
                class="ask-voice-btn"
                type="button"
                title="음성 입력"
                aria-label="음성 입력"
              >
                🎤
              </button>
              <button
                id="stop-tts-btn"
                class="ask-voice-btn"
                type="button"
                title="음성 중지"
                aria-label="음성 중지"
              >
                ⏹
              </button>
              <button
                class="ask-voice-btn ask-upload-btn"
                type="button"
                title="지식 파일 업로드"
                aria-label="지식 파일 업로드"
              >
                +
              </button>
              <input
                class="ask-upload-input"
                type="file"
                accept=".txt,.pdf,.png,.jpg,.jpeg,.webp,.bmp,.gif,image/*"
                hidden
              />
              <details class="ask-tools-menu">
                <summary class="ask-tools-trigger" aria-label="채팅 옵션 열기">
                  <span class="ask-tools-trigger-icon">⋯</span>
                  <span class="ask-tools-trigger-text">옵션</span>
                </summary>
                <div class="ask-tools-popover">
                  <label class="ask-tools-switch" for="tts-toggle">
                    <span>TTS</span>
                    <input id="tts-toggle" type="checkbox" checked />
                  </label>
                  <label class="ask-tools-switch" for="stt-toggle">
                    <span>STT</span>
                    <input id="stt-toggle" type="checkbox" checked />
                  </label>
                  <label class="ask-tools-switch" for="web-search-toggle">
                    <span>WEB</span>
                    <input id="web-search-toggle" type="checkbox" />
                  </label>
                </div>
              </details>
            </div>
            <input
              class="ask-input"
              type="text"
              name="question"
              placeholder="질문을 입력해 주세요..."
              autocomplete="off"
            />
            <button class="ask-send-btn" type="submit">전송</button>
          </form>
        </div>

        <div class="chat-tab-panel" role="tabpanel" aria-live="polite" data-chat-panel="handover" hidden>
          <div class="handover-board" role="table" aria-label="인수인계 테이블">
            <div class="handover-row handover-head" role="row">
              <span role="columnheader">이슈</span>
              <span role="columnheader">내용</span>
              <span role="columnheader">작업자</span>
            </div>
            <div class="handover-row" role="row">
              <span role="cell"></span>
              <span role="cell"></span>
              <span role="cell"></span>
            </div>
            <div class="handover-row" role="row">
              <span role="cell"></span>
              <span role="cell"></span>
              <span role="cell"></span>
            </div>
            <div class="handover-row" role="row">
              <span role="cell"></span>
              <span role="cell"></span>
              <span role="cell"></span>
            </div>
            <div class="handover-row" role="row">
              <span role="cell"></span>
              <span role="cell"></span>
              <span role="cell"></span>
            </div>
            <div class="handover-row" role="row">
              <span role="cell"></span>
              <span role="cell"></span>
              <span role="cell"></span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/dashboard.js"></script>
  </body>
</html>
