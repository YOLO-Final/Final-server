<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Factory Dashboard</title>
  <!--
    This page is the browser-based web dashboard shell.
    It is separate from the PyQt/on-device pages that load /js/dashboard.js.
  -->
  <script>
    (function () {
      /* 대시보드 화면은 로그인 성공 이후에만 열려야 한다.
         사용자가 주소를 직접 입력해 들어오더라도
         세션이 없으면 로그인 화면으로 되돌려 인증 흐름을 강제한다. */
      try {
        const raw = localStorage.getItem('dashboard_auth_v1');
        const auth = raw ? JSON.parse(raw) : null;
        const accessToken = sessionStorage.getItem('sfp_access_token');

        if (!auth || auth.loggedIn !== true || !accessToken) {
          window.location.replace('/web_login.html');
        }
      } catch (_error) {
        window.location.replace('/web_login.html');
      }
    })();
  </script>
  <!-- 공통 + 화면별 스타일 -->
  <!-- 역할별 화면 조각이 분리되어 있어서 스타일도 기능 단위로 나눠 로드한다.
       공통 레이아웃은 dashboard_style.css,
       역할별 카드/차트/상세 UI는 각 역할 전용 CSS가 담당한다. -->
  <link rel="stylesheet" href="css/wed_dashboard/dashboard_style.css?v=20260323-action-queue-fix1">
  <link rel="stylesheet" href="css/wed_dashboard/dashboard_promo.css?v=20260323-promo-css-split1">
  <link rel="stylesheet" href="css/wed_dashboard/dashboard_manager.css?v=20260323-manager-action-inline1">
  <link rel="stylesheet" href="css/wed_dashboard/dashboard_qa.css?v=20260323-qa-css-split1">
  <link rel="stylesheet" href="css/wed_dashboard/dashboard_worker.css?v=20260323-worker-pie-tooltip2">
  <link rel="stylesheet" href="css/wed_dashboard/dashboard_status.css?v=20260318-worker-pie2">
  <!-- Chart.js는 worker / qa / manager / promo 차트 공통 의존성이다. -->
  <script src="js/vendor/chart.umd.min.js?v=20260318-worker-pie2"></script>
  <script>
    (function() {
      /* 배포 파일에 vendor 번들이 있으면 그 파일을 우선 쓰고,
         누락된 환경에서만 CDN 백업 로더를 사용한다.
         즉, 정상 배포 환경에서는 추가 네트워크 요청 없이 동작하도록 설계된 구조다. */
      if (window.Chart) return;
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
      s.async = false;
      document.head.appendChild(s);
    })();
  </script>
</head>
<body>

<div class="app-shell">

  <!-- ============ 사이드바 ============ -->
  <aside class="sidebar" id="sidebar">

    <div class="sb-logo">
      <button class="sb-toggle" id="sbToggle" aria-label="사이드바 접기">
        <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="2" y1="4.5" x2="16" y2="4.5"/>
          <line x1="2" y1="9" x2="16" y2="9"/>
          <line x1="2" y1="13.5" x2="16" y2="13.5"/>
        </svg>
      </button>
      <div class="sb-logo-info">
        <div class="sb-brand">Smart Factory OPS</div>
        <div class="sb-ver">Platform v2.4</div>
      </div>
    </div>

    <nav class="sb-nav">
      <!-- 각 메뉴의 data-tab 값은 dashboard_app.js의 switchTab(tab) 인자로 그대로 전달된다.
           즉, HTML 네비 항목과 JS 렌더러 선택이 이 문자열로 연결된다. -->
      <div class="sb-item active" data-tab="worker">
        <div class="sb-item-icon"><div class="sb-role-badge rb-worker">작업</div></div>
        <div class="sb-item-text">
          <span class="sb-item-name">작업자</span>
          <span class="sb-item-desc">내 라인 현황</span>
        </div>
      </div>

      <div class="sb-item" data-tab="qa">
        <div class="sb-item-icon"><div class="sb-role-badge rb-qa">품질</div></div>
        <div class="sb-item-text">
          <span class="sb-item-name">품질관리자</span>
          <span class="sb-item-desc">불량 · 검사 현황</span>
        </div>
      </div>

      <div class="sb-item" data-tab="manager">
        <div class="sb-item-icon"><div class="sb-role-badge rb-manager">관리</div></div>
        <div class="sb-item-text">
          <span class="sb-item-name">관리자</span>
          <span class="sb-item-desc">OEE · 리스크 현황</span>
        </div>
      </div>

      <div class="sb-divider"></div>

      <div class="sb-item" data-tab="promo">
        <div class="sb-item-icon"><div class="sb-role-badge rb-promo">송출</div></div>
        <div class="sb-item-text">
          <span class="sb-item-name">공용 송출</span>
          <span class="sb-item-desc">현장 브로드캐스트</span>
        </div>
      </div>
    </nav>

    <div class="sb-bottom">
      <!-- 사용자 정보는 초기 HTML에 예시 값이 들어 있지만,
           실제 화면에서는 dashboard_session.js가 세션 사용자 정보로 덮어쓴다. -->
      <div class="sb-user">
        <div class="sb-avatar-cell">
          <div class="sb-avatar" id="userAvatar">옥</div>
        </div>
        <div class="sb-user-info">
          <span class="sb-username" id="userName">옥준영</span>
          <span class="sb-userrole" id="userRoleLabel">관리자 권한</span>
          <span class="sb-pill" id="userRolePill">manager</span>
        </div>
      </div>
      <div class="sb-logout" id="logoutBtn">
        <!-- 로그아웃 클릭 시 단순 화면 이동이 아니라
             세션 스토리지 정리 + 로그인 페이지 리다이렉트까지 JS에서 함께 처리한다. -->
        <div class="sb-logout-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </div>
        <span class="sb-logout-text">로그아웃</span>
      </div>
    </div>
  </aside>

  <!-- ============ 메인 영역 ============ -->
  <div class="main-area">

    <!-- 상단 헤더: breadcrumb / 날짜 / 알림 / 테마 / 프레젠테이션 제어 -->
    <header class="top-header">
      <div class="header-breadcrumb">
        대시보드 / <span id="breadcrumb">작업자</span>
      </div>
      <div class="header-spacer"></div>
      <div class="header-datetime">
        <span class="header-date" id="headerDate"></span>
        <!-- 달력 -->
        <div class="cal-wrap">
          <button class="header-btn" id="calBtn" title="날짜 선택">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </button>
          <div class="cal-popup" id="calPopup">
            <div class="cal-nav">
              <button class="cal-nav-btn" id="calPrev">‹</button>
              <span class="cal-month" id="calMonth"></span>
              <button class="cal-nav-btn" id="calNext">›</button>
            </div>
            <div class="cal-dow"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div>
            <div class="cal-days" id="calDays"></div>
            <div class="cal-footer">
              <button class="cal-reset" id="calReset">초기화</button>
              <button class="cal-cancel" id="calCancel">취소</button>
              <button class="cal-confirm" id="calConfirm" disabled>선택</button>
            </div>
          </div>
        </div>
        <span class="header-time" id="headerTime"></span>
      </div>
      <!-- 알림 -->
      <div class="notif-wrapper">
        <button class="header-btn" id="notifBtn" title="알림">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="header-badge" id="notifDot"></span>
        </button>
        <div class="notif-popup" id="notifPopup">
          <div class="notif-head">
            <strong>알림</strong>
            <button class="notif-read-all" id="notifReadAll">모두 읽음</button>
          </div>
          <div class="notif-item">
            <div class="notif-dot-sm"></div>
            <div class="notif-item-body">
              LINE-B SMT-02 가동률 임계치 초과
              <div class="notif-item-time">2분 전</div>
            </div>
          </div>
          <div class="notif-item">
            <div class="notif-dot-sm"></div>
            <div class="notif-item-body">
              QA 불량률 4.2% — 임계 초과
              <div class="notif-item-time">8분 전</div>
            </div>
          </div>
          <div class="notif-item read">
            <div class="notif-dot-sm read"></div>
            <div class="notif-item-body">
              PIN-HOLE 검출 집중 발생 (6건)
              <div class="notif-item-time">23분 전</div>
            </div>
          </div>
        </div>
      </div>
      <!-- 다크모드 -->
      <button class="header-btn header-btn--promo" id="promoModeBtn" title="프레젠테이션 모드">⛶</button>
      <button class="header-btn" id="themeBtn" title="테마 전환">🌙</button>
    </header>

    <!-- 필터바: worker 이외 역할에서만 라인/공장/근무조/기간 조건을 조합한다. -->
    <div class="filter-bar">
      <!-- 작업자(worker) 권한에서는 이 필터 바를 숨기고,
           관리자/품질/공용 송출 역할에서만 공장/라인/근무조/기간 조합 필터를 사용한다. -->
      <select class="filter-select" id="filterFactory">
        <option value="">공장 전체</option>
        <option value="본사 1공장">본사 1공장</option>
      </select>
      <select class="filter-select" id="filterLine">
        <option value="">라인 전체</option>
        <option value="LINE-A">LINE-A</option>
        <option value="LINE-B">LINE-B</option>
        <option value="LINE-C">LINE-C</option>
        <option value="LINE-D">LINE-D</option>
      </select>
      <select class="filter-select" id="filterShift">
        <option value="">근무조 전체</option>
        <option value="주간">주간</option>
        <option value="야간">야간</option>
      </select>
      <select class="filter-select filter-select-date" id="filterPeriod">
        <option value="">오늘</option>
        <option value="yesterday">어제</option>
        <option value="weekly">이번 주</option>
      </select>
      <button class="filter-btn primary" id="filterApply">필터 적용</button>
    </div>

    <!-- 날짜 배너: 선택일/기간 비교 상태를 설명한다. -->
    <div class="date-banner" id="dateBanner" style="margin:0 20px 0;margin-top:10px">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="bannerText"></span>
      <button class="banner-close" id="bannerClose">✕</button>
    </div>

    <!-- 메인 콘텐츠: dashboard_app.js가 현재 탭 bundle을 여기 렌더한다. -->
    <div class="content-scroll">
      <!-- 실제 카드/차트/표 본문은 정적 HTML이 아니라
           dashboard_app.js가 현재 탭 번들을 받아 innerHTML로 주입한다. -->
      <div id="mainContent"></div>
    </div>

  </div><!-- /main-area -->
</div><!-- /app-shell -->

<!-- 상세 모달: 목록형 모달과 detail API 모달이 공통으로 사용한다. -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="document.getElementById('detailModal').classList.remove('open')">✕</button>
    <div id="detailModalContent"></div>
  </div>
</div>

<!-- 스크립트 로드 순서는 중요하다.
     1. 상태/세션/권한/공통 API 계층
     2. 차트/상세뷰/공용 UI 헬퍼
     3. 역할별 화면 렌더러
     4. 마지막에 dashboard_app.js가 위 모듈을 조합해 앱을 부팅한다. -->
<script src="js/wed_dashboard/dashboard_state.js?v=20260318-worker-pie2"></script>
<script src="js/wed_dashboard/dashboard_thresholds.js?v=20260318-worker-pie2"></script>
<script src="js/wed_dashboard/dashboard_api.js?v=20260319-api-live-only1"></script>
<script src="js/wed_dashboard/dashboard_session.js?v=20260323-session-split1"></script>
<script src="js/wed_dashboard/dashboard_permissions.js?v=20260323-session-split1"></script>
<script src="js/wed_dashboard/dashboard_ui.js?v=20260323-ui-split1"></script>
<script src="js/wed_dashboard/dashboard_kpi.js?v=20260323-kpi-split1"></script>
<script src="js/wed_dashboard/dashboard_detail_views.js?v=20260318-worker-pie2"></script>
<script src="js/wed_dashboard/dashboard_charts.js?v=20260323-worker-pie-tooltip2"></script>
<!-- 역할/화면별 렌더러 -->
<script src="js/wed_dashboard/dashboard_worker.js?v=20260323-worker-pie-tooltip2"></script>
<script src="js/wed_dashboard/dashboard_qa.js?v=20260323-layout-split1"></script>
<script src="js/wed_dashboard/dashboard_manager.js?v=20260323-manager-action-fix1"></script>
<script src="js/wed_dashboard/dashboard_promo.js?v=20260323-layout-split1"></script>
<!-- app.js는 마지막에 로드되어 위 모듈들을 조합해 실제 화면을 그린다. -->
<script src="js/wed_dashboard/dashboard_app.js?v=20260323-kpi-split1"></script>
</body>
</html>
