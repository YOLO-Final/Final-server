<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>web_dashboard 사용자 흐름 기반 아키텍처</title>
  <style>
    body { margin: 0; background: #f6f8fb; }
    svg { display: block; margin: 0 auto; background: #f6f8fb; }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1920" height="1500"
     viewBox="0 0 1920 1500"
     font-family="'Malgun Gothic','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#445069"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#b3261e"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#1f7a4d"/>
    </marker>
  </defs>

  <rect width="1920" height="1500" fill="#f6f8fb"/>

  <text x="960" y="42" text-anchor="middle" font-size="28" font-weight="bold" fill="#102a43">
    web_dashboard.html 연관 백엔드 아키텍처
  </text>
  <text x="960" y="69" text-anchor="middle" font-size="14" fill="#486581">
    실제 코드 기준 사용자 흐름: 로그인 -> 세션 저장 -> web_dashboard 진입 -> 탭별 API 조회 -> FastAPI dashboard module -> repository snapshot -> PostgreSQL -> 번들 응답 -> 렌더
  </text>

  <rect x="50" y="95" width="620" height="1335" rx="18" fill="#fffdf7" stroke="#d9822b" stroke-width="2"/>
  <text x="85" y="126" font-size="22" font-weight="bold" fill="#b15d12">1. 사용자 흐름</text>
  <text x="85" y="148" font-size="12" fill="#7c4a03">브라우저에서 실제로 일어나는 순서</text>

  <rect x="90" y="180" width="540" height="110" rx="14" fill="#fff" stroke="#d9e2ec"/>
  <circle cx="125" cy="215" r="18" fill="#d9822b"/>
  <text x="125" y="221" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">1</text>
  <text x="155" y="212" font-size="18" font-weight="bold" fill="#102a43">로그인 시작</text>
  <text x="155" y="236" font-size="13" fill="#334e68">`web_login.html` + `web_login.js`</text>
  <text x="155" y="258" font-size="12" fill="#486581">ID/PW 로그인 또는 Face ID 로그인 선택</text>
  <text x="155" y="278" font-size="12" fill="#486581">이미 세션이 있으면 `/web_dashboard.html`로 즉시 이동</text>

  <rect x="90" y="330" width="540" height="140" rx="14" fill="#fff" stroke="#d9e2ec"/>
  <circle cx="125" cy="365" r="18" fill="#d9822b"/>
  <text x="125" y="371" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">2</text>
  <text x="155" y="362" font-size="18" font-weight="bold" fill="#102a43">인증 API 호출</text>
  <text x="155" y="386" font-size="12" fill="#334e68">`POST /api/v1/auth/login` 또는 `POST /api/v1/auth/login/face`</text>
  <text x="155" y="408" font-size="12" fill="#334e68">로그인 성공 후 `GET /api/v1/auth/web-login-profile/{employee_no}`</text>
  <text x="155" y="430" font-size="12" fill="#486581">역할(role)을 worker / qa / manager 기준으로 정규화</text>
  <text x="155" y="452" font-size="12" fill="#486581">액세스 토큰과 리프레시 토큰을 같이 확보</text>

  <rect x="90" y="510" width="540" height="130" rx="14" fill="#fff" stroke="#d9e2ec"/>
  <circle cx="125" cy="545" r="18" fill="#d9822b"/>
  <text x="125" y="551" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">3</text>
  <text x="155" y="542" font-size="18" font-weight="bold" fill="#102a43">세션 저장 후 대시보드 진입</text>
  <text x="155" y="566" font-size="12" fill="#334e68">`saveDashboardSession()`</text>
  <text x="155" y="588" font-size="12" fill="#486581">`localStorage.dashboard_auth_v1 = { loggedIn, user, role }`</text>
  <text x="155" y="610" font-size="12" fill="#486581">`sessionStorage.sfp_access_token`, `sfp_refresh_token`, `sfp_user` 저장</text>
  <text x="155" y="632" font-size="12" fill="#486581">이후 `/web_dashboard.html`로 이동</text>

  <rect x="90" y="680" width="540" height="145" rx="14" fill="#fff" stroke="#d9e2ec"/>
  <circle cx="125" cy="715" r="18" fill="#d9822b"/>
  <text x="125" y="721" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">4</text>
  <text x="155" y="712" font-size="18" font-weight="bold" fill="#102a43">web_dashboard 진입 가드</text>
  <text x="155" y="736" font-size="12" fill="#334e68">`web_dashboard.html` head inline script</text>
  <text x="155" y="758" font-size="12" fill="#486581">`dashboard_auth_v1.loggedIn === true` 확인</text>
  <text x="155" y="780" font-size="12" fill="#486581">`sessionStorage.sfp_access_token` 확인</text>
  <text x="155" y="802" font-size="12" fill="#b3261e">둘 중 하나라도 없으면 렌더 전에 `/web_login.html`로 리다이렉트</text>

  <rect x="90" y="865" width="540" height="165" rx="14" fill="#fff" stroke="#d9e2ec"/>
  <circle cx="125" cy="900" r="18" fill="#d9822b"/>
  <text x="125" y="906" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">5</text>
  <text x="155" y="897" font-size="18" font-weight="bold" fill="#102a43">초기 렌더와 탭 전환</text>
  <text x="155" y="921" font-size="12" fill="#334e68">`dashboard_app.js` -> `switchTab('worker')`로 시작</text>
  <text x="155" y="943" font-size="12" fill="#486581">사이드바 탭 클릭: worker / qa / manager / promo</text>
  <text x="155" y="965" font-size="12" fill="#486581">`renderCurrentTab()` -> `DASHBOARD_API.fetchBundle(tab)`</text>
  <text x="155" y="987" font-size="12" fill="#486581">응답 번들은 `DASH_STATE.currentBundle`에 저장</text>
  <text x="155" y="1009" font-size="12" fill="#7b8794">현재 필터 UI는 보이지만 실제 호출은 `fetchBundle(tab)`로만 이뤄짐</text>

  <rect x="90" y="1070" width="540" height="170" rx="14" fill="#fff" stroke="#d9e2ec"/>
  <circle cx="125" cy="1105" r="18" fill="#d9822b"/>
  <text x="125" y="1111" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">6</text>
  <text x="155" y="1102" font-size="18" font-weight="bold" fill="#102a43">인증 포함 API 요청</text>
  <text x="155" y="1126" font-size="12" fill="#334e68">`dashboard_api.js` -> `authorizedFetch(url)`</text>
  <text x="155" y="1148" font-size="12" fill="#486581">`Authorization: Bearer {sfp_access_token}` 헤더 추가</text>
  <text x="155" y="1170" font-size="12" fill="#486581">대상 엔드포인트: `/api/v1/dashboard/web/{tab}`</text>
  <text x="155" y="1192" font-size="12" fill="#486581">401이면 `POST /api/v1/auth/refresh` 호출 후 원요청 1회 재시도</text>
  <text x="155" y="1214" font-size="12" fill="#b3261e">refresh도 실패하면 세션 삭제 후 `/web_login.html` 이동</text>

  <rect x="90" y="1280" width="540" height="110" rx="14" fill="#fff" stroke="#d9e2ec"/>
  <circle cx="125" cy="1315" r="18" fill="#d9822b"/>
  <text x="125" y="1321" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">7</text>
  <text x="155" y="1312" font-size="18" font-weight="bold" fill="#102a43">화면 렌더와 로컬 상세 보기</text>
  <text x="155" y="1336" font-size="12" fill="#334e68">탭 레이아웃 + Chart.js 렌더</text>
  <text x="155" y="1358" font-size="12" fill="#486581">상세 모달은 현재 `currentBundle` 기반 로컬 렌더</text>
  <text x="155" y="1380" font-size="12" fill="#7b8794">즉 `web_dashboard.html`은 현재 `/api/v1/dashboard/detail`을 직접 호출하지 않음</text>

  <rect x="720" y="95" width="1150" height="610" rx="18" fill="#f8fbff" stroke="#486581" stroke-width="2"/>
  <text x="755" y="126" font-size="22" font-weight="bold" fill="#243b53">2. 백엔드 실행 경로</text>
  <text x="755" y="148" font-size="12" fill="#486581">실제 브라우저 요청이 FastAPI 내부에서 통과하는 계층</text>

  <rect x="760" y="180" width="500" height="485" rx="16" fill="#fff" stroke="#bcccdc"/>
  <text x="790" y="212" font-size="19" font-weight="bold" fill="#1f7a4d">Auth Module</text>
  <text x="790" y="234" font-size="12" fill="#486581">로그인, 프로필 조회, 토큰 갱신 담당</text>

  <rect x="790" y="265" width="440" height="82" rx="12" fill="#e8f5ee" stroke="#7bd2a3"/>
  <text x="820" y="292" font-size="16" font-weight="bold" fill="#1f7a4d">`src/modules/auth/router.py`</text>
  <text x="820" y="315" font-size="12" fill="#22543d">`/login`, `/login/face`, `/web-login-profile/{employee_no}`, `/refresh`</text>
  <text x="820" y="335" font-size="12" fill="#22543d">대시보드 관련 API는 bearer 검증에 `get_current_user` 사용</text>

  <rect x="790" y="375" width="440" height="108" rx="12" fill="#eefbf4" stroke="#7bd2a3"/>
  <text x="820" y="402" font-size="16" font-weight="bold" fill="#1f7a4d">`src/modules/auth/service.py`</text>
  <text x="820" y="425" font-size="12" fill="#22543d">`login_with_password()`</text>
  <text x="820" y="447" font-size="12" fill="#22543d">`face_login_with_matching()`</text>
  <text x="820" y="469" font-size="12" fill="#22543d">`get_web_login_profile()` / `refresh_access_token()`</text>

  <rect x="790" y="511" width="440" height="122" rx="12" fill="#f4fff8" stroke="#7bd2a3"/>
  <text x="820" y="538" font-size="16" font-weight="bold" fill="#1f7a4d">인증 저장소와 보조 계층</text>
  <text x="820" y="561" font-size="12" fill="#22543d">`jwt.py`에서 access / refresh token 발급</text>
  <text x="820" y="583" font-size="12" fill="#22543d">사용자/권한 조회 후 web dashboard role 정규화에 필요한 데이터 제공</text>
  <text x="820" y="605" font-size="12" fill="#22543d">결과적으로 프론트는 `dashboard_auth_v1` + `sfp_* token` 세트를 저장</text>

  <rect x="1310" y="180" width="520" height="485" rx="16" fill="#fff" stroke="#bcccdc"/>
  <text x="1340" y="212" font-size="19" font-weight="bold" fill="#0f609b">Dashboard Module</text>
  <text x="1340" y="234" font-size="12" fill="#486581">탭별 bundle 생성과 실시간 snapshot 조합 담당</text>

  <rect x="1340" y="265" width="460" height="94" rx="12" fill="#eaf4ff" stroke="#8bb7ff"/>
  <text x="1370" y="292" font-size="16" font-weight="bold" fill="#0f609b">`src/modules/dashboard/router.py`</text>
  <text x="1370" y="315" font-size="12" fill="#1b4b72">외부 경로: `GET /api/v1/dashboard/web/worker|qa|manager|promo`</text>
  <text x="1370" y="337" font-size="12" fill="#1b4b72">모든 web 라우트가 `Depends(get_current_user)`로 보호됨</text>

  <rect x="1340" y="387" width="460" height="122" rx="12" fill="#f1f7ff" stroke="#8bb7ff"/>
  <text x="1370" y="414" font-size="16" font-weight="bold" fill="#0f609b">`src/modules/dashboard/service.py`</text>
  <text x="1370" y="437" font-size="12" fill="#1b4b72">`get_web_worker_dashboard()`</text>
  <text x="1370" y="459" font-size="12" fill="#1b4b72">`get_web_qa_dashboard()` / `get_web_manager_dashboard()` / `get_web_promo_dashboard()`</text>
  <text x="1370" y="481" font-size="12" fill="#1b4b72">각 함수는 기본 번들을 만든 뒤 `_apply_web_*_live()`로 실제 snapshot 값을 덮어씀</text>

  <rect x="1340" y="537" width="460" height="96" rx="12" fill="#f7fbff" stroke="#8bb7ff"/>
  <text x="1370" y="564" font-size="16" font-weight="bold" fill="#0f609b">응답 계약</text>
  <text x="1370" y="587" font-size="12" fill="#1b4b72">프론트는 `meta` + `kpis` 존재 여부를 필수로 검사</text>
  <text x="1370" y="609" font-size="12" fill="#1b4b72">화면별 datasets: worker / qa / manager / promo 구조가 다름</text>

  <rect x="720" y="740" width="1150" height="380" rx="18" fill="#ffffff" stroke="#829ab1" stroke-width="2"/>
  <text x="755" y="772" font-size="22" font-weight="bold" fill="#243b53">3. Repository Snapshot과 DB</text>
  <text x="755" y="794" font-size="12" fill="#486581">web dashboard는 화면마다 따로 DB를 두드리기보다, snapshot 한 번을 만들어 여러 탭 bundle에 재사용하는 구조</text>

  <rect x="760" y="825" width="420" height="250" rx="14" fill="#f8fbff" stroke="#bcccdc"/>
  <text x="790" y="857" font-size="18" font-weight="bold" fill="#243b53">`src/modules/dashboard/repository.py`</text>
  <text x="790" y="882" font-size="13" fill="#334e68">핵심 함수: `get_web_dashboard_snapshot(line_code=None)`</text>
  <text x="790" y="907" font-size="12" fill="#486581">shift_start / month_start / effective_now 기준 시간 경계 계산</text>
  <text x="790" y="929" font-size="12" fill="#486581">총생산, 양품, NG, 검사량, 활성 알람 수 집계</text>
  <text x="790" y="951" font-size="12" fill="#486581">라인별 가동률, 성능, 품질률, OEE, risk_score 계산</text>
  <text x="790" y="973" font-size="12" fill="#486581">상위 결함, 활성 알람, 시간대 생산량, 주간/월간 요약 생성</text>
  <text x="790" y="995" font-size="12" fill="#486581">선택 라인(line filter)이 있으면 focus line 중심으로 worker/manager 데이터 조정</text>

  <rect x="1210" y="825" width="300" height="250" rx="14" fill="#fffdf7" stroke="#e9b949"/>
  <text x="1240" y="857" font-size="18" font-weight="bold" fill="#8d5a00">주요 DB 테이블</text>
  <text x="1240" y="884" font-size="12" fill="#7c4a03">`wed_dashboard.production_records`</text>
  <text x="1240" y="906" font-size="12" fill="#7c4a03">`wed_dashboard.inspection_results`</text>
  <text x="1240" y="928" font-size="12" fill="#7c4a03">`wed_dashboard.defect_results`</text>
  <text x="1240" y="950" font-size="12" fill="#7c4a03">`wed_dashboard.alarms`</text>
  <text x="1240" y="972" font-size="12" fill="#7c4a03">`wed_dashboard.alarm_ack_history`</text>
  <text x="1240" y="994" font-size="12" fill="#7c4a03">`wed_dashboard.equipment_status_history`</text>
  <text x="1240" y="1016" font-size="12" fill="#7c4a03">`wed_dashboard.lines` / `equipments`</text>

  <rect x="1540" y="825" width="290" height="250" rx="14" fill="#eefcf6" stroke="#7bd2a3"/>
  <text x="1570" y="857" font-size="18" font-weight="bold" fill="#1f7a4d">서비스 반영 방식</text>
  <text x="1570" y="884" font-size="12" fill="#22543d">worker: 라인 상태, 최근 NG, 액션 큐</text>
  <text x="1570" y="906" font-size="12" fill="#22543d">qa: 불량률, top defects, 재검 큐</text>
  <text x="1570" y="928" font-size="12" fill="#22543d">manager: OEE, 생산 추세, active alarms, risk</text>
  <text x="1570" y="950" font-size="12" fill="#22543d">promo: 송출용 KPI, 라인 현황, ticker</text>
  <text x="1570" y="972" font-size="12" fill="#22543d">공통적으로 `meta.dataMode = "live"`로 응답</text>

  <rect x="720" y="1155" width="1150" height="275" rx="18" fill="#fff" stroke="#829ab1" stroke-width="2"/>
  <text x="755" y="1187" font-size="22" font-weight="bold" fill="#243b53">4. 발표할 때 짚으면 좋은 현재 구조 포인트</text>

  <rect x="760" y="1215" width="1090" height="58" rx="12" fill="#f8fbff" stroke="#d9e2ec"/>
  <text x="790" y="1240" font-size="13" fill="#334e68">1. `web_dashboard.html`은 이미 mock 설명 문서와 달리 실제 `/api/v1/dashboard/web/{tab}`를 호출한다.</text>
  <text x="790" y="1260" font-size="13" fill="#334e68">   즉 발표는 "프론트 mock 구조"보다 "실제 auth + dashboard backend 흐름"을 중심으로 잡는 편이 맞다.</text>

  <rect x="760" y="1285" width="1090" height="58" rx="12" fill="#fffdf7" stroke="#f0b429"/>
  <text x="790" y="1310" font-size="13" fill="#7c4a03">2. 상세 모달은 현재 `currentBundle` 기반 로컬 렌더다.</text>
  <text x="790" y="1330" font-size="13" fill="#7c4a03">   `/api/v1/dashboard/detail` 라우트는 존재하지만, 현재 `web_dashboard.html` 사용자 흐름의 핵심 호출선에는 포함되지 않는다.</text>

  <rect x="760" y="1355" width="1090" height="58" rx="12" fill="#fff5f5" stroke="#d64545"/>
  <text x="790" y="1380" font-size="13" fill="#8a1c1c">3. 토큰 만료 처리까지 포함해야 실제 사용자 흐름이 완성된다.</text>
  <text x="790" y="1400" font-size="13" fill="#8a1c1c">   `authorizedFetch()` -> 401 -> `/api/v1/auth/refresh` -> 재시도 -> 실패 시 로그인 페이지 복귀가 운영상 핵심 분기다.</text>

  <line x1="360" y1="290" x2="360" y2="330" stroke="#445069" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="470" x2="360" y2="510" stroke="#445069" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="640" x2="360" y2="680" stroke="#445069" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="825" x2="360" y2="865" stroke="#445069" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="1030" x2="360" y2="1070" stroke="#445069" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="1240" x2="360" y2="1280" stroke="#445069" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="630" y1="400" x2="760" y2="400" stroke="#1f7a4d" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="692" y="388" text-anchor="middle" font-size="11" fill="#1f7a4d">auth API</text>

  <line x1="630" y1="1155" x2="1310" y2="1155" stroke="#0f609b" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="970" y="1141" text-anchor="middle" font-size="11" fill="#0f609b">dashboard API</text>

  <line x1="1480" y1="665" x2="1480" y2="740" stroke="#445069" stroke-width="3" marker-end="url(#arrow)"/>
